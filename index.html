<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ניהול עובדים</title>

<style>
body{
  font-family:Arial;
  background:#f5f7fb;
  margin:0;
  padding:20px;
}

h1{
  margin-bottom:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

input,select{
  padding:8px;
  margin:5px 0;
  width:100%;
}

button{
  padding:10px;
  border:none;
  background:#2563eb;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

button.danger{
  background:#dc2626;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

td,th{
  padding:8px;
  border-bottom:1px solid #ddd;
  text-align:right;
}

</style>
</head>

<body>

<h1>ניהול עובדים</h1>

<div class="card">
<h3>הוספת עובד</h3>
<input id="name" placeholder="שם עובד">
<button onclick="addEmployee()">שמור</button>
</div>

<div class="card">
<h3>רשימת עובדים</h3>
<table>
<thead>
<tr>
<th>שם</th>
<th>פעולות</th>
</tr>
</thead>
<tbody id="employees"></tbody>
</table>
</div>

<div class="card">
<h3>הוספת רישום עבודה</h3>

<select id="emp"></select>
<select id="work"></select>

<input id="qty" placeholder="כמות">
<input id="time" placeholder="שעות:דקות">

<button onclick="addLog()">שמור רישום</button>

</div>

<div class="card">
<h3>דשבורד</h3>
<div id="dashboard"></div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbx4t__5Rrf6ChX-JJYHSmZQ_4KanN03uTBayyRvG3G0hT6texwkrVCJDPkxoGzE5vRaZg/exec";

async function api(fn,payload={}){
  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({function:fn,payload})
  });
  let j=await r.json();
  if(j.error) throw j.error;
  return j.result;
}

async function load(){
  let data=await api("getInitialData");

  renderEmployees(data.employees);
  renderSelects(data);
  renderDashboard(data.dashboard);
}

function renderEmployees(list){
  let html="";
  list.forEach(e=>{
    html+=`
    <tr>
      <td>${e.name}</td>
      <td>
        <button onclick="delEmp('${e.employeeId}')" class="danger">מחק</button>
      </td>
    </tr>`;
  });
  document.getElementById("employees").innerHTML=html;
}

function renderSelects(data){
  let emp=document.getElementById("emp");
  let work=document.getElementById("work");

  emp.innerHTML="";
  work.innerHTML="";

  data.employees.forEach(e=>{
    emp.innerHTML+=`<option value="${e.employeeId}">${e.name}</option>`;
  });

  data.workTypes.forEach(w=>{
    work.innerHTML+=`<option value="${w.workTypeId}">${w.workName}</option>`;
  });
}

function renderDashboard(d){
  let html="";
  d.byEmployee.forEach(e=>{
    html+=`<div>${e.employeeName} - ${e.balance} ₪</div>`;
  });
  document.getElementById("dashboard").innerHTML=html;
}

async function addEmployee(){
  let name=document.getElementById("name").value;
  await api("saveEmployee",{name});
  document.getElementById("name").value="";
  load();
}

async function delEmp(id){
  await api("deleteEmployee",id);
  load();
}

async function addLog(){
  await api("saveWorkLog",{
    employeeId:document.getElementById("emp").value,
    workTypeId:document.getElementById("work").value,
    quantity:document.getElementById("qty").value,
    timeHHMM:document.getElementById("time").value
  });

  load();
}

load();
</script>

</body>
</html>
